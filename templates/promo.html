<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    width:1080px;
    height:1350px;
    margin:0;
    overflow:hidden;
    font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:#ffffff;
  }

  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    box-sizing:border-box;
    padding:0;
  }

  .frame {
    position:relative;
    width:1080px;
    height:1350px;
    {{FRAME_STYLE}}
    overflow:hidden;
  }

  .frame::before {
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(11, 13, 24, 0.08) 0%, rgba(11, 13, 24, 0.2) 100%);
    pointer-events:none;
  }

  .promo-strip {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:80px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#7553C4;
    color:#ffffff;
    font-size:30px;
    font-weight:900;
    letter-spacing:-0.02em;
    z-index:3;
  }

  .card {
    width:100%;
    max-width:none;
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    text-align:center;
    padding:0 108px 110px;
    box-sizing:border-box;
    position:relative;
    z-index:1;
  }

  .card::before {
    content:"";
    position:absolute;
    inset:220px 180px 430px;
    background:radial-gradient(circle, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.04) 52%, rgba(255,255,255,0) 100%);
    filter:blur(8px);
    pointer-events:none;
  }

  .brand {
    display:flex;
    align-items:center;
    justify-content:center;
    align-self:center;
    min-width:320px;
    min-height:52px;
    padding:0 18px;
    position:absolute;
    bottom:34px;
    left:50%;
    transform:translateX(-50%);
    z-index:1;
  }

  .brand-logo {
    display:block;
    width:340px;
    height:auto;
    filter:drop-shadow(0 8px 24px rgba(0,0,0,0.18));
  }

  .brand-text {
    font-size:28px;
    font-weight:900;
    letter-spacing:-0.03em;
    color:rgba(255,255,255,0.94);
    text-transform:lowercase;
    text-shadow:0 8px 24px rgba(0,0,0,0.18);
    white-space:nowrap;
  }

  .content {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
    margin-top:470px;
    position:relative;
    z-index:1;
    width:100%;
  }

  .headline {
    font-size:66px;
    font-weight:900;
    line-height:1.16;
    letter-spacing:-0.05em;
    color:#ffffff;
    text-shadow:0 12px 30px rgba(0,0,0,0.18);
    word-break:keep-all;
  }

  .cta {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:460px;
    min-height:78px;
    padding:0 30px;
    box-sizing:border-box;
    border-radius:22px;
    background:rgba(255,255,255,0.2);
    border:1px solid rgba(255,255,255,0.22);
    font-size:27px;
    font-weight:700;
    color:#ffffff;
    letter-spacing:-0.02em;
    box-shadow:0 12px 30px rgba(0,0,0,0.14);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    margin-top:96px;
    position:relative;
    z-index:1;
  }

  .subcopy {
    font-size:30px;
    line-height:1.48;
    font-weight:600;
    color:rgba(255,255,255,0.76);
    letter-spacing:-0.03em;
    text-shadow:0 6px 20px rgba(0,0,0,0.14);
  }
</style>
</head>
<body>

<div class="frame">
  <div class="promo-strip">AI 메모 앱은 디지털페이지</div>
  <div class="card">
    <div class="brand">{{PROMO_BRAND_BLOCK}}</div>

    <div class="content">
      <div class="headline">{{TITLE_HTML}}</div>

      <div class="subcopy">
        {{SUBTITLE_HTML}}
      </div>
    </div>

    <div class="cta">
      {{CTA}}
    </div>
  </div>
</div>

</body>
</html>
